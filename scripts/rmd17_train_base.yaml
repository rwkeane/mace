# Base MACE training config for rMD17 molecules.
# Data paths and experiment name are filled in by create_rmd17_dataset.py.

seed: 0

# Architecture
model: ScaleShiftMACE
scaling: rms_forces_scaling
hidden_irreps: "128x0e + 128x0o + 128x1e + 128x1o + 128x2e + 128x2o + 128x3e + 128x3o"
r_max: 5.0
num_interactions: 2
max_ell: 3
correlation: 3
num_radial_basis: 8
num_cutoff_basis: 5
radial_MLP: "[64, 64, 64, 1024]"
MLP_irreps: "16x0e"
gate: silu

# Training
batch_size: 5
valid_batch_size: 5
max_num_epochs: 500
eval_interval: 4
lr: 0.01
amsgrad: yes
weight_decay: 5.0e-7
scheduler: ReduceLROnPlateau
scheduler_patience: 50
lr_factor: 0.8
ema: yes
ema_decay: 0.99

# Loss
energy_weight: 1.0
forces_weight: 1000.0
energy_key: REF_energy
forces_key: REF_forces
loss: weighted

E0s: average

config_type_weights:
  Default: 1.0

device: cuda
default_dtype: float32
